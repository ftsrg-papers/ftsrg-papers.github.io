<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ftsrg-papers — Research Publications</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f0f4f8;
      --border:     #d1dbe8;
      --text:       #1e293b;
      --text-muted: #64748b;
      --accent:     #0284c7;
      --header-bg:  #0f2540;
      --header-hl:  #38bdf8;
      --font:       system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      --mono:       'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────────────── */
    header {
      background: var(--header-bg);
      padding: 2.75rem 2rem 2.25rem;
      text-align: center;
    }

    .header-inner { max-width: 900px; margin: 0 auto; }

    header h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--header-hl);
    }

    header .tagline {
      margin-top: 0.5rem;
      font-size: 1.0625rem;
      color: #cbd5e1;
    }

    header .org-link {
      display: inline-block;
      margin-top: 1rem;
      font-size: 0.875rem;
      color: #7dd3fc;
      text-decoration: none;
      border: 1px solid #1e4976;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      transition: background 0.15s, color 0.15s;
    }

    header .org-link:hover { background: #1e4976; color: #fff; }

    /* ── Main ─────────────────────────────────────────── */
    main {
      flex: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      width: 100%;
    }

    /* ── Footer ───────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── BibBase overrides ────────────────────────────── */

    /* Top-level container */
    #bibbase_content,
    div.bibbase {
      font-family: var(--font) !important;
      font-size: 0.9375rem;
      color: var(--text);
    }

    /* Search box */
    #bibbase_content input[type=search],
    #bibbase_content input[type=text] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font);
      font-size: 0.875rem;
      background: #fff;
      color: var(--text);
      margin-bottom: 1.25rem;
      outline: none;
    }

    #bibbase_content input[type=search]:focus,
    #bibbase_content input[type=text]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgb(2 132 199 / .15);
    }

    /* Year / type group headings */
    div.bibbase_group_content > div.bibbase_group,
    div.bibbase_group {
      font-size: 1.25rem !important;
      font-weight: 700 !important;
      color: var(--header-bg) !important;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.4rem;
      margin: 2rem 0 0.875rem !important;
    }

    /* Hide the icon inside the group header */
    div.bibbase_group i { display: none; }

    /* Paper cards */
    div.bibbase_paper {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem 0.875rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 1px 3px rgb(0 0 0 / .06);
      transition: box-shadow 0.2s, transform 0.15s;
    }

    div.bibbase_paper:hover {
      box-shadow: 0 4px 12px rgb(0 0 0 / .1);
      transform: translateY(-1px);
    }

    /* Title */
    span.bibbase_paper_title,
    span.bibbase_paper_title a {
      font-size: 1rem !important;
      font-weight: 600 !important;
      color: var(--text) !important;
      text-decoration: none !important;
    }

    span.bibbase_paper_title a:hover {
      color: var(--accent) !important;
      text-decoration: underline !important;
    }

    /* Authors */
    span.bibbase_paper_author {
      font-size: 0.875rem !important;
      color: var(--text-muted) !important;
      font-style: italic;
    }

    /* Venue / journal / booktitle */
    span.bibbase_paper_booktitle,
    span.bibbase_paper_journal {
      font-size: 0.875rem !important;
      color: var(--text-muted) !important;
    }

    /* Links row */
    div.bibbase_paper .bibbase_paper_links,
    div.bibbase_paper span.bibbase_paper_links {
      margin-top: 0.5rem;
    }

    a.bibbase.link,
    span.bibbase_icon_text {
      color: var(--accent) !important;
      font-size: 0.8rem !important;
      text-decoration: none !important;
      margin-right: 0.25rem;
    }

    a.bibbase.link:hover,
    span.bibbase_icon_text:hover {
      text-decoration: underline !important;
    }

    /* Abstract / BibTeX text */
    div.bibbase_note,
    div.bibbase_abstract {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.65;
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }

    /* BibTeX code block */
    div.bibbase_bibtex pre,
    pre.bibbase_bibtex {
      font-family: var(--mono);
      font-size: 0.8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      overflow-x: auto;
      white-space: pre;
      margin-top: 0.5rem;
    }

    /* Dropdown arrows / toggles */
    .dropdown-toggle {
      color: var(--text-muted) !important;
      text-decoration: none !important;
      font-size: 0.8rem !important;
    }

    /* Author names: keep the filter-click behaviour but look like plain text */
    a.bibbase.author.link {
      color: inherit !important;
      text-decoration: none !important;
      font-style: italic;
    }

    a.bibbase.author.link:hover {
      text-decoration: underline !important;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>ftsrg papers</h1>
      <p class="tagline">Publications and supplementary materials</p>
    </div>
  </header>

  <main>
    <script src="https://bibbase.org/show?bib=https%3A%2F%2Fftsrg-papers.github.io%2Fpublications.bib&jsonp=1&theme=simple&group0=year&sort0=year&sortDir0=desc&showSearch=true&owner=none"></script>
  </main>

  <script>
    // Rewrite BibBase title links from url_pdf (./paper.pdf → /repo-name/paper.pdf)
    // to the repo's gh-pages root (/repo-name/).
    (function () {
      const host = location.hostname; // ftsrg-papers.github.io

      function fixTitleLinks() {
        // Cover BibBase title selectors across themes and versions
        document.querySelectorAll(
          '.bibbase_paper_title a, ' +        // theme=simple / default
          '.bibbase_paper_titleauthors b a, ' + // older table layout
          '.bibbase_paper > b > a'              // minimal themes
        ).forEach(a => {
          const href = a.getAttribute('href') || '';
          // Normalise to a root-relative path
          let path = '';
          if (href.startsWith('/')) {
            path = href;
          } else if (href.includes('://' + host + '/')) {
            // Absolute URL pointing at our own site
            path = href.slice(href.indexOf('://' + host) + 3 + host.length);
          }
          if (!path) return;
          const m = path.match(/^\/([\w.+-]+)\//);
          if (m) a.href = '/' + m[1] + '/';
        });
      }

      // MutationObserver catches BibBase DOM insertions
      new MutationObserver(fixTitleLinks)
        .observe(document.querySelector('main') || document.body,
                 { subtree: true, childList: true });

      // Polling fallback for cached/fast JSONP loads
      [0, 300, 1000, 3000].forEach(ms => setTimeout(fixTitleLinks, ms));
    }());
  </script>

  <footer>
    <a href="https://github.com/ftsrg-papers"
       target="_blank" rel="noopener noreferrer">github.com/ftsrg-papers</a>
  </footer>
</body>
</html>
