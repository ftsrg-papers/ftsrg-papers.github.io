name: Update Repository List

# Runs on a frequent schedule and can be triggered manually.
#
# GitHub Actions cannot natively react to org-level repository events
# (create / delete / rename) in another repository, so polling is the
# only GitHub-native option.  Because this is a public repo, Actions
# minutes are free and unlimited.
#
# Use the "Run workflow" button in the Actions tab for an immediate
# refresh after creating or removing a paper repository.

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:

# Only one run at a time, globally (group is not scoped to a branch).
# Any queued run is cancelled when a newer one arrives.
concurrency:
  group: update-repos
  cancel-in-progress: true

permissions:
  contents: write   # needed to commit publications.bib back

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update publications.bib
        env:
          # ORG_READ_TOKEN: fine-grained PAT with Contents:read + Metadata:read
          # on all org repos — required to include private repositories.
          # Falls back to GITHUB_TOKEN (public repos only) if not set.
          GH_TOKEN: ${{ secrets.ORG_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_repos.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet publications.bib; then
            echo "publications.bib is up to date — nothing to commit."
          else
            git add publications.bib
            git commit -m "chore: update publications [skip ci]"
            git push
          fi
