name: Update Repository List

# Runs on a frequent schedule and can be triggered manually.
#
# GitHub Actions cannot natively react to org-level repository events
# (create / delete / rename) in another repository, so polling is the
# only GitHub-native option.  Because this is a public repo, Actions
# minutes are free and unlimited.
#
# Use the "Run workflow" button in the Actions tab for an immediate
# refresh after creating or removing a paper repository.

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:

# Only one run at a time, globally (group is not scoped to a branch).
# Any queued run is cancelled when a newer one arrives.
concurrency:
  group: update-repos
  cancel-in-progress: true

permissions:
  contents: write   # needed to commit repos.json back

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet pyyaml

      - name: Update repos.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_repos.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet repos.json; then
            echo "repos.json is up to date — nothing to commit."
          else
            git add repos.json
            git commit -m "chore: update repository list [skip ci]"
            git push
          fi
